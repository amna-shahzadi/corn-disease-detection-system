name: corn_disease_app
description: A Flutter mobile app for corn disease detection
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  file_picker: ^11.0.2
  image_picker: ^1.0.4
  permission_handler: ^12.0.1
  flutter:
    sdk: flutter
  # Google Sign-In (for backend Google login)
  google_sign_in: ^6.3.0
  # Optional: For better error handling
  http: ^1.1.0
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1
  
flutter:
  uses-material-design: true

  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_logo.png"